<!DOCTYPE html>
<html>
<head>
<style>
  
  div.ex1 {
    position: fixed;
    top: 0px; 
    right: 0;
    width: 150px;
    height: 100px;
    border: 3px solid #73AD21;
    background-color: white;
    z-index: 100; 
  }

  
  table, td, th {
    border: 1px solid black;
  }

  table {
    position: absolute;
    left: 0;
    top: 0;
    margin: 10px;
    border-collapse: collapse;
    width: 300px; 
  }
</style>
</head>
<body>

<div class="ex1">
  This div <br>element has<br> position fixed;
</div>

<table>
  <tr style="background-color: Gray; color: white;">
    <th>Firstname</th>
    <th>Lastname</th>
  </tr>
  <tr style="background-color: Yellow;">
    <td>詹</td>
    <td>迪凱</td>
  </tr>
  <tr>
    <td>Kevin</td>
    <td>Chan</td>
  </tr>
  <tr style="background-color: Yellow;">
    <td>詹</td>
    <td>迪凱</td>
  </tr>
</table>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Practice</title>
    <style>
        /* 基本頁面設定 */
        body {
            background-color: #58ACFA; /* 藍色背景 */
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* 白色容器 */
        .container {
            background-color: white;
            width: 90%;
            max-width: 600px;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 共用方塊樣式 */
        .box {
            border-radius: 4px;
            min-height: 60px;
        }

        /* 綠色頂部 */
        .header {
            background-color: #A2D149;
            height: 100px;
        }

        /* 藍綠色區塊容器 */
        .row-teal {
            display: flex;
            flex-direction: row; /* 預設橫排 (b圖) */
            gap: 10px;
        }
        .row-teal .box {
            background-color: #00BCC9;
            flex: 1; /* 均分寬度 */
            height: 80px;
        }

        /* 灰色底部區塊容器 */
        .row-grey {
            display: flex;
            flex-direction: row; /* 預設橫排 (b圖) */
            gap: 10px;
        }
        .row-grey .box {
            background-color: #EEEEEE;
            flex: 1;
            height: 40px;
        }

       /* --- 響應式關鍵：當寬度小於 480px 時 --- */
        @media screen and (max-width: 480px) {
            /* 藍綠色區塊：依然維持一列一個 */
            .row-teal {
                flex-direction: column;
            }
            .row-teal .box {
                height: 50px;
            }

            /* 灰色區塊：改為 2x2 排列 */
            .row-grey {
                flex-wrap: wrap; /* 允許換行 */
                flex-direction: row; /* 保持橫向排列以便換行 */
                justify-content: space-between; /* 讓方塊左右貼齊 */
            }
            .row-grey .box {
                /* 計算寬度：50% 減去 gap 的一半 */
                flex: 0 0 calc(50% - 5px); 
                height: 40px;
                margin-bottom: 0px; /* 視情況調整間距 */
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="box header"></div>

        <div class="row-teal">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>

        <div class="row-grey">
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
            <div class="box"></div>
        </div>
    </div>

</body>
</html>
